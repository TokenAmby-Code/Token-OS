name: Prod Gate (tests)

# Full pytest suite — RESERVED for the future prod-branch CI.
#
# Background: pytest was stripped from the hot main-path gate (pr.yml's `quality`
# job) so PRs reach `main` fast (Emperor-decreed CI-policy change). The tests were
# NOT deleted or weakened — the complete suite lives here, intact, and will run as
# a blocking gate on the prod branch once that branch exists.
#
# Until a `prod` branch is created, the pull_request/push triggers below simply
# never fire, so this workflow is inert on the hot path — it does not run on PRs
# into `main` and cannot block them. It can be exercised on demand any time via
# the Actions tab (workflow_dispatch) to confirm the suite still passes.
#
# Runs under pytest-xdist (-n auto --dist loadfile) — parallelized across runner
# cores so the full suite finishes in a few minutes instead of ~20 min serial.

on:
  pull_request:
    branches: [prod]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [prod]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: prod-gate-${{ github.ref }}
  cancel-in-progress: true

# Run JS actions on Node 24 — Node 20 is being removed from runners (Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    # Least-privilege: this job only checks out and runs pytest.
    permissions:
      contents: read
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --python 3.11 --all-groups

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --python 3.11 --all-groups

      # Reliability harness (workflow_dispatch): token-api runs parallel (the
      # long pole, green on clean CI); cli-tools runs serial. pytest-randomly
      # shuffles order each run to surface order-dependence deterministically.
      - name: Test (pytest)
        run: |
          if [ -f token-api/pyproject.toml ] && [ -d token-api/tests ]; then
            (cd token-api && uv run --python 3.11 --group dev pytest -n auto --dist loadfile --timeout=120 --tb=short)
          fi
          if [ -f cli-tools/pyproject.toml ] && [ -d cli-tools/tests ]; then
            (cd cli-tools && uv run --python 3.11 --group dev pytest --timeout=120 --tb=short)
          fi
