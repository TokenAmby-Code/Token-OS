name: Prod Gate (tests)

# Full pytest suite — the ACTIVE prod-branch regression gate.
#
# Background: pytest was stripped from the dev hot path (pr.yml's `quality` job and
# push.yml's advisory run) so PRs reach `main` fast and dev CI stays quiet
# (Emperor-decreed CI-policy change). The tests were NOT deleted or weakened — the
# complete suite lives here, intact, and is the heavyweight regression that `main`
# intentionally skips. Authority model: dev = CodeRabbit + CD; prod = full
# regression suite.
#
# The `prod` branch now exists (created off the post-#420/#373 stable main HEAD),
# so the triggers below are live:
#   - pull_request -> prod   : the merge-to-prod gate (runs the full suite before
#                              anything lands on prod).
#   - push -> prod           : post-merge confirmation on prod.
#   - schedule (nightly)     : daily regression sweep of `prod`, catching
#                              environmental drift (dep updates, order-dependence)
#                              even on days with no merge.
#   - workflow_dispatch      : run on demand any time via the Actions tab.
# It still never runs on PRs into `main`, so it cannot block the dev hot path.
#
# To make this a BLOCKING merge-to-prod gate, branch protection on `prod` must
# require the `tests` check (configured in GitHub settings, outside this file).
#
# Runs under pytest-xdist (-n auto --dist loadfile) — parallelized across runner
# cores so the full suite finishes in a few minutes instead of ~20 min serial.

on:
  pull_request:
    branches: [prod]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [prod]
  schedule:
    # 08:00 UTC daily — nightly heavyweight regression on the prod branch.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: prod-gate-${{ github.ref }}
  cancel-in-progress: true

# Run JS actions on Node 24 — Node 20 is being removed from runners (Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    # Least-privilege: this job only checks out and runs pytest.
    permissions:
      contents: read
    # `!= true` (not `== false`) so the job also runs on push/schedule/dispatch,
    # where `github.event.pull_request` is null — only a draft PR is skipped.
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          # This job only checks out and runs pytest — no downstream git ops
          # need the token, so don't persist it into git config.
          persist-credentials: false
          # schedule runs default to the repo default branch (main); pin the
          # nightly sweep to `prod` so it tests the prod branch, not main.
          ref: ${{ github.event_name == 'schedule' && 'prod' || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --python 3.11 --all-groups

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --python 3.11 --all-groups

      # Reliability harness (workflow_dispatch): token-api runs parallel (the
      # long pole, green on clean CI); cli-tools runs serial. pytest-randomly
      # shuffles order each run to surface order-dependence deterministically.
      - name: Test (pytest)
        run: |
          if [ -f token-api/pyproject.toml ] && [ -d token-api/tests ]; then
            (cd token-api && uv run --python 3.11 --group dev pytest -n auto --dist loadfile --timeout=120 --tb=short)
          fi
          if [ -f cli-tools/pyproject.toml ] && [ -d cli-tools/tests ]; then
            # -n0 overrides the addopts parallel default; cli-tools stays serial on CI (contended runner unverified for parallel).
            (cd cli-tools && uv run --python 3.11 --group dev pytest -n0 --timeout=120 --tb=short)
          fi
