name: Bounty Board (advisory)

# The NON-BLOCKING half of the Coherence Wave's two-lane model.
#
#   regression  (prod-gate.yml, REQUIRED)  = what the code must keep doing.
#   bounty board (this file, ADVISORY)     = what the vault says the code SHOULD
#                                            do but doesn't yet.
#
# Bounty tests live under */tests/bounty_board/ and are auto-marked `bounty` +
# xfail(strict=False) by that directory's conftest.py. So:
#   - an unbuilt feature's test XFAILs  -> bounty OPEN, this job stays GREEN.
#   - the day the feature ships it XPASSes -> visible signal to GRADUATE the test
#     into the regression suite.
#
# This workflow is intentionally NOT a required status check on any branch — it
# never blocks a merge. It only renders the board. Full contract:
# Imperium vault `Sessions/coherence-wave.md`.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: bounty-board-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bounty-board:
    permissions:
      contents: read
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --python 3.11 --all-groups

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --python 3.11 --all-groups

      # Run ONLY the bounty lane. `-rxX` surfaces xfail (open) and xpass
      # (claimable) lines in the summary. pytest exit code 5 = "no bounty tests
      # collected", which is a healthy empty board, not a failure.
      - name: Bounty board (token-api)
        if: hashFiles('token-api/tests/bounty_board/**') != ''
        run: |
          cd token-api
          uv run --python 3.11 --group dev pytest -m bounty -n0 --timeout=120 --tb=short -rxX || \
            { code=$?; [ "$code" -eq 5 ] && echo "empty bounty board (ok)" || exit "$code"; }

      - name: Bounty board (cli-tools)
        if: hashFiles('cli-tools/tests/bounty_board/**') != ''
        run: |
          cd cli-tools
          uv run --python 3.11 --group dev pytest -m bounty -n0 --timeout=120 --tb=short -rxX || \
            { code=$?; [ "$code" -eq 5 ] && echo "empty bounty board (ok)" || exit "$code"; }
