name: PR Gate (blocking)

# Tier 2 — assertive, blocking.
# Triggered on PR open / synchronize / reopen against main. Failures here
# block merge via branch protection. CodeRabbit GitHub App handles the
# assertive review (governed by .coderabbit.yaml in repo root) — this
# workflow runs the deterministic gates. The initial cutover blocks on format
# and fatal lint; typecheck/tests are advisory until their baseline is clean.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install uv
        env:
          UV_VERSION: "0.8.15"
        run: |
          python -m pip install "uv==${UV_VERSION}"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --all-groups

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --all-groups

      - name: Format check (ruff)
        run: |
          if [ -f cli-tools/pyproject.toml ]; then
            (cd cli-tools && uv run ruff format --check .)
          fi
          if [ -f token-api/pyproject.toml ]; then
            (cd token-api && uv run ruff format --check .)
          fi

      - name: Lint (ruff)
        run: |
          if [ -f cli-tools/pyproject.toml ]; then
            (cd cli-tools && uv run ruff check .)
          fi
          if [ -f token-api/pyproject.toml ]; then
            (cd token-api && uv run ruff check .)
          fi

      - name: Typecheck (mypy)
        continue-on-error: true
        run: |
          if [ -f cli-tools/pyproject.toml ]; then
            (cd cli-tools && uv run mypy --ignore-missing-imports .)
          fi
          if [ -f token-api/pyproject.toml ]; then
            (cd token-api && uv run mypy --ignore-missing-imports .)
          fi

      - name: Test (pytest)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          if [ -f cli-tools/pyproject.toml ] && [ -d cli-tools/tests ]; then
            (cd cli-tools && uv run pytest -x --tb=short)
          fi
          if [ -f token-api/pyproject.toml ] && [ -d token-api/tests ]; then
            (cd token-api && uv run pytest -x --tb=short)
          fi

  # CodeRabbit GitHub App posts its own `coderabbit` commit status. Branch
  # protection on main requires BOTH "PR Gate (blocking) / quality" AND
  # "coderabbit" before merge. Typecheck/tests should become blocking after
  # the existing baseline failures are resolved.
