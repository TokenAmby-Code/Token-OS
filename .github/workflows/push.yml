name: Push Gate (advisory)

# Tier 1 — chill, advisory.
# Triggered on every push to non-main branches. Failures surface as
# annotations and a non-blocking summary; they do NOT prevent further
# work or PR creation. Use this signal to catch obvious problems early
# without paying the PR-as-review-fishing-trip cost.

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --all-groups || true
        continue-on-error: true

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --all-groups || true
        continue-on-error: true

      - name: Format check (ruff)
        id: fmt
        continue-on-error: true
        run: |
          set -o pipefail
          if [ -d cli-tools ]; then
            (cd cli-tools && uv run ruff format --check .) || echo "::warning::ruff format check failed (cli-tools)"
          fi
          if [ -d token-api ]; then
            (cd token-api && uv run ruff format --check .) || echo "::warning::ruff format check failed (token-api)"
          fi

      - name: Lint (ruff)
        id: lint
        continue-on-error: true
        run: |
          if [ -d cli-tools ]; then
            (cd cli-tools && uv run ruff check .) || echo "::warning::ruff check failed (cli-tools)"
          fi
          if [ -d token-api ]; then
            (cd token-api && uv run ruff check .) || echo "::warning::ruff check failed (token-api)"
          fi

      - name: Typecheck (mypy)
        id: types
        continue-on-error: true
        run: |
          if [ -d cli-tools ]; then
            (cd cli-tools && uv run mypy --ignore-missing-imports . 2>&1 | tail -100) || echo "::warning::mypy failed (cli-tools)"
          fi
          if [ -d token-api ]; then
            (cd token-api && uv run mypy --ignore-missing-imports . 2>&1 | tail -100) || echo "::warning::mypy failed (token-api)"
          fi

      - name: Test (pytest)
        id: test
        continue-on-error: true
        run: |
          if [ -d cli-tools/tests ]; then
            (cd cli-tools && uv run pytest -x --tb=short) || echo "::warning::pytest failed (cli-tools)"
          fi
          if [ -d token-api/tests ]; then
            (cd token-api && uv run pytest -x --tb=short) || echo "::warning::pytest failed (token-api)"
          fi

      - name: CodeRabbit chill review
        id: cr
        continue-on-error: true
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          if [ -z "${CODERABBIT_API_KEY:-}" ]; then
            echo "::notice::CODERABBIT_API_KEY not set — skipping push-side cr CLI review"
            exit 0
          fi
          curl -fsSL https://cli.coderabbit.ai/install.sh | sh
          # Try profile override flag first (assumed CLI support);
          # fall back to a sibling .coderabbit-cli.yaml via --config if it exists.
          if [ -f .coderabbit-cli.yaml ]; then
            cr review --config .coderabbit-cli.yaml --base "$GITHUB_REF_NAME" --output review.json || true
          else
            cr review --review-profile chill --base "$GITHUB_REF_NAME" --output review.json || true
          fi

      - name: Upload review artifact
        if: always() && hashFiles('review.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coderabbit-chill-review
          path: review.json
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            echo "### Push Gate Summary"
            echo ""
            echo "Tier 1 — advisory only. Failures are annotations, not blockers."
            echo ""
            echo "| Step | Outcome |"
            echo "|------|---------|"
            echo "| format-check | ${{ steps.fmt.outcome }} |"
            echo "| lint | ${{ steps.lint.outcome }} |"
            echo "| typecheck | ${{ steps.types.outcome }} |"
            echo "| tests | ${{ steps.test.outcome }} |"
            echo "| coderabbit (chill) | ${{ steps.cr.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
