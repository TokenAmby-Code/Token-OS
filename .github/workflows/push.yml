name: Push Gate (advisory)

# Tier 1 — chill, advisory.
# Triggered on every push to non-main branches. Failures surface as
# annotations and a non-blocking summary; they do NOT prevent further
# work or PR creation. Use this signal to catch obvious problems early
# without paying the PR-as-review-fishing-trip cost.

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install uv
        env:
          UV_VERSION: "0.8.15"
        run: |
          python -m pip install "uv==${UV_VERSION}"

      - name: Sync Python deps (cli-tools)
        if: hashFiles('cli-tools/pyproject.toml') != ''
        working-directory: cli-tools
        run: uv sync --all-groups || true
        continue-on-error: true

      - name: Sync Python deps (token-api)
        if: hashFiles('token-api/pyproject.toml') != ''
        working-directory: token-api
        run: uv sync --all-groups || true
        continue-on-error: true

      - name: Format check (ruff)
        id: fmt
        continue-on-error: true
        run: |
          rc=0
          if [ -f cli-tools/pyproject.toml ]; then
            (cd cli-tools && uv run ruff format --check .) || rc=1
          fi
          if [ -f token-api/pyproject.toml ]; then
            (cd token-api && uv run ruff format --check .) || rc=1
          fi
          exit "$rc"

      - name: Lint (ruff)
        id: lint
        continue-on-error: true
        run: |
          rc=0
          if [ -f cli-tools/pyproject.toml ]; then
            (cd cli-tools && uv run ruff check .) || rc=1
          fi
          if [ -f token-api/pyproject.toml ]; then
            (cd token-api && uv run ruff check .) || rc=1
          fi
          exit "$rc"

      - name: Typecheck (mypy)
        id: types
        continue-on-error: true
        run: |
          rc=0
          if [ -f cli-tools/pyproject.toml ]; then
            set +e
            output=$(cd cli-tools && uv run mypy --ignore-missing-imports . 2>&1)
            project_rc=$?
            set -e
            printf '%s\n' "$output" | tail -100
            [[ $project_rc -eq 0 ]] || rc=1
          fi
          if [ -f token-api/pyproject.toml ]; then
            set +e
            output=$(cd token-api && uv run mypy --ignore-missing-imports . 2>&1)
            project_rc=$?
            set -e
            printf '%s\n' "$output" | tail -100
            [[ $project_rc -eq 0 ]] || rc=1
          fi
          exit "$rc"

      - name: Test (pytest)
        id: test
        continue-on-error: true
        run: |
          rc=0
          if [ -f cli-tools/pyproject.toml ] && [ -d cli-tools/tests ]; then
            (cd cli-tools && uv run pytest -x --tb=short) || rc=1
          fi
          if [ -f token-api/pyproject.toml ] && [ -d token-api/tests ]; then
            (cd token-api && uv run pytest -x --tb=short) || rc=1
          fi
          exit "$rc"

      - name: CodeRabbit chill review
        id: cr
        continue-on-error: true
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CODERABBIT_API_KEY:-}" ]; then
            echo "::notice::CODERABBIT_API_KEY not set — skipping push-side cr CLI review"
            exit 0
          fi
          curl -fsSL https://cli.coderabbit.ai/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          review_args=(--api-key "$CODERABBIT_API_KEY" --base origin/main --plain)
          if [ -f .coderabbit-cli.yaml ]; then
            review_args+=(--config .coderabbit-cli.yaml)
          fi
          coderabbit review "${review_args[@]}" | tee coderabbit-review.txt

      - name: Upload review artifact
        if: always() && hashFiles('coderabbit-review.txt') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coderabbit-chill-review
          path: coderabbit-review.txt
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            echo "### Push Gate Summary"
            echo ""
            echo "Tier 1 — advisory only. Failures are annotations, not blockers."
            echo ""
            echo "| Step | Outcome |"
            echo "|------|---------|"
            echo "| format-check | ${{ steps.fmt.outcome }} |"
            echo "| lint | ${{ steps.lint.outcome }} |"
            echo "| typecheck | ${{ steps.types.outcome }} |"
            echo "| tests | ${{ steps.test.outcome }} |"
            echo "| coderabbit (chill) | ${{ steps.cr.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
