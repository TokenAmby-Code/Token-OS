name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets and sensitive data
        shell: bash
        env:
          # Store actual IPs in GitHub Secrets so patterns stay private
          TAILSCALE_IP_MAC: ${{ secrets.TAILSCALE_IP_MAC }}
          TAILSCALE_IP_WSL: ${{ secrets.TAILSCALE_IP_WSL }}
          TAILSCALE_IP_PHONE: ${{ secrets.TAILSCALE_IP_PHONE }}
          LAN_IP_NAS: ${{ secrets.LAN_IP_NAS }}
          LAN_IP_PHONE: ${{ secrets.LAN_IP_PHONE }}
        run: |
          set -euo pipefail

          ALLOWLIST=".github/secrets-allowlist.txt"
          FINDINGS=$(mktemp)

          # On push to main, scan all tracked files
          # On PR, scan only the diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SCAN_SOURCE="diff"
            CONTENT=$(git diff origin/main...HEAD -- . ':!.github/secrets-allowlist.txt' ':!.github/workflows/secrets-scan.yml' | grep -E '^\+[^+]' || true)
          else
            SCAN_SOURCE="full"
            CONTENT=$(git ls-files -z | xargs -0 cat 2>/dev/null || true)
          fi

          if [ -z "$CONTENT" ]; then
            echo "Nothing to scan."
            exit 0
          fi

          check_allowlist() {
            local line="$1"
            if [ -f "$ALLOWLIST" ]; then
              while IFS= read -r allow_pattern; do
                [[ -z "$allow_pattern" || "$allow_pattern" == \#* ]] && continue
                if echo "$line" | grep -qF "$allow_pattern"; then
                  return 0
                fi
              done < "$ALLOWLIST"
            fi
            return 1
          }

          scan_pattern() {
            local label="$1"
            local pattern="$2"
            local matches
            matches=$(echo "$CONTENT" | grep -EnP "$pattern" || true)
            if [ -n "$matches" ]; then
              echo "$matches" | while IFS= read -r line; do
                check_allowlist "$line" && continue
                echo "  [$label] $line" >> "$FINDINGS"
              done
            fi
          }

          # === Specific IPs from GitHub Secrets ===
          # These catch exact IPs without revealing them in the workflow file
          for ip_var in TAILSCALE_IP_MAC TAILSCALE_IP_WSL TAILSCALE_IP_PHONE LAN_IP_NAS LAN_IP_PHONE; do
            ip_val="${!ip_var:-}"
            if [ -n "$ip_val" ]; then
              escaped=$(echo "$ip_val" | sed 's/\./\\./g')
              scan_pattern "$ip_var" "$escaped"
            fi
          done

          # === Generic patterns ===

          # Tailscale CGNAT range (broad catch)
          scan_pattern "TAILSCALE_IP" '100\.\d{1,3}\.\d{1,3}\.\d{1,3}'

          # Private network IPs
          scan_pattern "PRIVATE_IP_192" '192\.168\.\d{1,3}\.\d{1,3}'
          scan_pattern "PRIVATE_IP_10" '\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b'

          # API keys / tokens (generic)
          scan_pattern "API_KEY" '(?i)(api[_-]?key|api[_-]?secret|access[_-]?token|secret[_-]?key)\s*[=:]\s*["\x27]?[A-Za-z0-9_\-]{16,}'

          # Discord webhooks
          scan_pattern "DISCORD_WEBHOOK" 'https://discord(app)?\.com/api/webhooks/\d+/[A-Za-z0-9_\-]+'

          # Discord bot tokens (base64-ish pattern)
          scan_pattern "DISCORD_BOT_TOKEN" '[MN][A-Za-z\d]{23,27}\.[A-Za-z\d_-]{6}\.[A-Za-z\d_-]{27,40}'

          # SSH/TLS private keys
          scan_pattern "PRIVATE_KEY" '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'

          # GitHub tokens
          scan_pattern "GITHUB_TOKEN" '(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}'

          # OpenAI keys
          scan_pattern "OPENAI_KEY" 'sk-[A-Za-z0-9]{20,}'

          # Anthropic keys
          scan_pattern "ANTHROPIC_KEY" 'sk-ant-[A-Za-z0-9_\-]{20,}'

          # Brave Search API keys
          scan_pattern "BRAVE_KEY" 'BSA-[A-Za-z0-9_\-]{16,}'

          # GPS coordinates (lat/lon pairs that look like Phoenix metro)
          scan_pattern "GPS_COORDS" '3[23]\.\d{4,}.*-11[12]\.\d{4,}'

          # Hardcoded passwords/secrets in assignments
          scan_pattern "HARDCODED_SECRET" '(?i)^.*(password|passwd|secret|credential)\s*[=:]\s*["\x27]?[^\s"'\'']{8,}'

          # SMB URLs with usernames
          scan_pattern "SMB_AUTH_URL" 'smb://[^/\s]+@'

          if [ -s "$FINDINGS" ]; then
            echo ""
            echo "========================================="
            echo " SECRETS SCAN FAILED"
            echo "========================================="
            echo " Mode: $SCAN_SOURCE"
            echo ""
            sort -u "$FINDINGS"
            echo ""
            echo "To allow false positives, add the substring to .github/secrets-allowlist.txt"
            rm -f "$FINDINGS"
            exit 1
          fi

          rm -f "$FINDINGS"
          echo "Secrets scan passed ($SCAN_SOURCE mode)."
