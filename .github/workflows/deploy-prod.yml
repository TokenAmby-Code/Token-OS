name: Deploy (prod)

# Triggers ONLY on merge to main. Per-worktree local dev URLs are
# untouched — there is no "merge to deploy dev" path. Merge means ship.

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # for OIDC-based cloud auth, if used

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install uv
        env:
          UV_VERSION: "0.8.15"
        run: |
          python -m pip install "uv==${UV_VERSION}"

      # ─── Replace this block with the actual prod deploy command ───
      # Examples:
      #   - gcloud run deploy ... (Cloud Run)
      #   - fly deploy
      #   - rsync over SSH to a VPS
      #   - kubectl rollout
      #
      # Until wired up, this is a no-op so merges to main don't fail.
      - name: Deploy
        run: |
          echo "TODO: wire prod deploy command here."
          echo "Commit: $GITHUB_SHA"
          echo "Ref:    $GITHUB_REF"
