<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Somnium</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231a2029'/%3E%3Cpath d='M3 8h10M8 3v10' stroke='%2369c7b6' stroke-width='2'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/ui/somnium/style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <span class="wordmark">Somnium</span>
        <div id="fleet-mix" class="chips chips--center"></div>
        <div class="topbar__status">
          <span id="connection-dot" class="dot dot--loading"></span>
          <span id="last-updated">Connecting</span>
        </div>
        <span id="topbar-compact" class="topbar__compact"></span>
      </header>

      <section class="metrics" aria-label="System metrics">
        <article class="metric metric--timer" title="">
          <span class="metric__label">Timer</span>
          <strong id="timer-mode">--</strong>
        </article>
        <article class="metric metric--work" title="">
          <span class="metric__label">Work</span>
          <strong id="work-state">--</strong>
        </article>
        <article class="metric metric--fleet" title="">
          <span class="metric__label">Fleet</span>
          <strong id="fleet-count">0 live</strong>
        </article>
        <article class="metric metric--attention" title="">
          <span class="metric__label">Attention</span>
          <strong id="attention-state">--</strong>
        </article>
      </section>

      <section class="workspace" aria-label="Operational display">
        <section class="panel panel--instances" aria-label="Live instances">
          <div class="panel__header">
            <h2>Instances</h2>
            <div id="instance-breakdown" class="chips"></div>
          </div>
          <div id="instances" class="instance-list"></div>
        </section>

        <aside class="side">
          <section id="selection-panel" class="panel panel--selection" data-tone="unknown" aria-label="Selected instance">
            <div class="panel__header">
              <h2>Selection</h2>
              <span id="selection-status" class="subtle">none</span>
            </div>
            <div class="selection">
              <strong id="selection-title">No instance selected</strong>
              <div id="selection-meta" class="chips"></div>
              <dl id="selection-fields" class="field-grid field-grid--two"></dl>
            </div>
          </section>

          <section class="panel" aria-label="Session documents">
            <div class="panel__header">
              <h2>Session Docs</h2>
              <span id="doc-count" class="subtle">0</span>
            </div>
            <div id="session-docs" class="lanes"></div>
          </section>

          <section id="events-panel" class="panel panel--events" aria-label="Recent events">
            <div class="panel__header">
              <h2>Events</h2>
              <span class="subtle">latest</span>
            </div>
            <div id="events" class="event-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="/ui/somnium/app.js"></script>
  </body>
</html>
