# CodeRabbit canonical configuration template
#
# Single source of truth — synced into each repo's .coderabbit.yaml via
# `coderabbit-sync` (cli-tools/bin/coderabbit-sync). Edit this file in the
# vault, then run sync against the target repo.
#
# Profile baseline is `assertive`: this file governs the CodeRabbit GitHub
# App on PRs (Tier 2, blocking). The push-side workflow (Tier 1, advisory)
# overrides via `cr` CLI flags or a sibling .coderabbit-cli.yaml.
#
# Reference: https://docs.coderabbit.ai/reference/yaml-template

language: en-US
early_access: false
enable_free_tier: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Block merge if assertive review flags issues. Branch protection on main
  # also requires the `coderabbit` check to pass.
  abort_on_close: true

  path_instructions:
    - path: "**/*.py"
      instructions: |
        - Enforce type hints on public functions and class methods.
        - Flag bare `except:` clauses.
        - Prefer pathlib over os.path for new code.
        - Flag print() in non-CLI code paths; prefer logging.
        - Check for f-string injection in subprocess / shell calls.

    - path: "**/*.sh"
      instructions: |
        - Require `set -euo pipefail` near the top.
        - Quote all variable expansions ("$var", "${var}").
        - Flag unquoted command substitutions.
        - Prefer `[[ ]]` over `[ ]` for tests in bash.

    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        - Flag `any` types without justification.
        - Require explicit return types on exported functions.
        - Flag console.log in production code paths.
        - Prefer named exports over default exports.

    - path: ".github/workflows/**"
      instructions: |
        - Pin third-party actions to a SHA, not a version tag.
        - Set explicit `permissions:` block at workflow or job level.
        - Avoid `pull_request_target` unless absolutely required.

    - path: "**/cli-tools/bin/**"
      instructions: |
        - Verify NAS-mount checks before NAS path access.
        - Confirm hardcoded paths use $IMPERIUM / $TOKEN_API_URL / imperium_cfg.

  # Tools CodeRabbit chains with on review.
  tools:
    ruff:
      enabled: true
    shellcheck:
      enabled: true
    biome:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
    languagetool:
      enabled: false  # noisy on technical prose

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto  # learn from accepted/rejected suggestions in this repo
  issues:
    scope: auto
  pull_requests:
    scope: auto
