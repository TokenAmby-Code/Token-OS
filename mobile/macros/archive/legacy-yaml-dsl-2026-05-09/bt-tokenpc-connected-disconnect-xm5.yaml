name: "BT TOKENPC Connected Disconnect XM5"
category: "Bluetooth"
description: "When the phone connects to TOKENPC, drop direct XM5 ownership so the PC retains sole headphone access"
enabled: true

variables:
  - name: xm5_mac
    type: string
    value: "AC:80:0A:27:0B:A9"
  - name: result
    type: string
    value: ""

triggers:
  - type: bluetooth
    device: "TOKENPC"
    state: "connected"

actions:
  - type: wait
    seconds: 3

  - type: shell
    command: "cmd bluetooth_manager disconnect {lv=xm5_mac} 2>&1 || echo EXIT_CODE=$?"
    root: false
    output_var: "result"

  - type: shell
    command: 'echo "{system_time} BT disconnect XM5 after TOKENPC connect result={lv=result}" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false
