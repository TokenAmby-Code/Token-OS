# Shizuku Died Detector
#
# Event-driven: fires when Shizuku's foreground service notification is dismissed/removed
# by the system (option=1). This happens immediately when Shizuku dies.
#
# POSTs to Mac token-api which runs `shizuku-connect start` to restart Shizuku
# via persistent ADB connection over Tailscale (port 5555).
#
# Constraint: shizuku_dead == false suppresses repeat alerts during a single outage.
# Reset by Shizuku Restored macro when Shizuku comes back.

name: "Shizuku Died"
category: "System"
description: "Detects Shizuku death via notification dismiss. POSTs to Mac for ADB restart."
enabled: true

global_variables:
  - name: shizuku_dead
    type: boolean
    value: false

triggers:
  - type: notification
    package: "moe.shizuku.privileged.api"
    option: 1  # 1 = dismissed/removed (service stopped)

constraints:
  - type: variable
    variable: "shizuku_dead"
    var_type: boolean
    comparison: equals
    value: "false"

actions:
  - type: set_variable
    name: "shizuku_dead"
    value: "true"
    var_type: boolean

  - type: notification
    title: "Shizuku Died"
    text: "Enforcement offline — Mac auto-restart triggered"
    channel_type: 1

  - type: vibrate
    pattern: [0, 300, 200, 300]

  - type: shell
    command: 'mkdir -p /storage/emulated/0/MacroDroid/logs; TS=$(date "+%Y-%m-%d %H:%M:%S"); BAT=$(dumpsys battery 2>/dev/null | grep -m1 "level:" | tr -d " " | cut -d: -f2); SSID=$(dumpsys wifi 2>/dev/null | grep -m1 "SSID:" | sed "s/.*SSID: //;s/,.*//" | tr -d " "); echo "$TS SHIZUKU_DIED wifi=$SSID bat=${BAT}%" >> /storage/emulated/0/MacroDroid/logs/shizuku.log'
    block: false

  - type: http_request
    url: "http://100.95.109.23:7777/phone/event"
    method: POST
    body: '{"event": "shizuku_died", "time": "{system_time}"}'
    content_type: "application/json"
    block: false
