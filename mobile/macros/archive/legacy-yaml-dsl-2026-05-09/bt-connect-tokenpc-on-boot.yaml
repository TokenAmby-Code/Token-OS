name: "BT Connect TOKENPC On Boot"
category: "Bluetooth"
description: "On phone boot, attempt to connect TOKENPC so phone audio routes through the PC when it is available"
enabled: true

variables:
  - name: bt_mac
    type: string
    value: "8A:88:4B:21:55:6F"
  - name: result
    type: string
    value: ""

triggers:
  - type: device_boot

actions:
  - type: wait
    seconds: 45

  - type: shell
    command: "cmd bluetooth_manager connect {lv=bt_mac} 2>&1 || echo EXIT_CODE=$?"
    root: false
    output_var: "result"

  - type: shell
    command: 'echo "{system_time} BT connect TOKENPC result={lv=result}" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false
