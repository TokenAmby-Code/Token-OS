# Shizuku Restart Helper
# Called by Enforce macro when enforcement timeout detects Shizuku failure.
# POSTs to Mac token-api for ADB-based restart (no app launch needed).

name: "Shizuku Restart"
category: "System"
description: "Callable recovery: POSTs to Mac for ADB restart. Called by Enforce on timeout."
enabled: true

global_variables:
  - name: shizuku_dead
    type: boolean
    value: false

triggers: []

actions:
  - type: set_variable
    name: "shizuku_dead"
    value: "true"
    var_type: boolean

  - type: http_request
    url: "http://100.95.109.23:7777/phone/event"
    method: POST
    body: '{"event": "shizuku_died", "time": "{system_time}", "source": "enforce_timeout"}'
    content_type: "application/json"
    block: false

  - type: shell
    command: 'echo "{system_time} WARN shizuku-restart ENFORCE_TIMEOUT" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false
