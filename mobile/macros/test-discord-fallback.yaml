# Test macro: send enforcement message to #fallback via webhook
# For validating the Discord fallback loop end-to-end.
# Delete after testing.

name: "Test Discord Fallback"
category: "Testing"
description: "Send a test enforcement message to Discord #fallback webhook"
enabled: true

triggers:
  - type: http_server
    identifier: "test-fallback"
    send_response: true

actions:
  - type: http_request
    url: "${DISCORD_FALLBACK_WEBHOOK}"
    method: POST
    body: '{"content":"POST /phone/enforce {\"level\":\"1\",\"app\":\"twitter\"}"}'
    content_type: "application/json"
    block_next: true
    timeout: 10

  - type: http_response
    code: "OK"
    text: '{"status": "sent"}'
