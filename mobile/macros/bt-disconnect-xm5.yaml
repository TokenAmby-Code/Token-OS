name: "BT Disconnect XM5"
category: "Bluetooth"
description: "Disconnect WF-1000XM5 headphones from phone on demand (HTTP endpoint + quick tile)"
enabled: true

variables:
  - name: bt_mac
    type: string
    value: "AC:80:0A:27:0B:A9"
  - name: result
    type: string
    value: ""

triggers:
  - type: http_server
    identifier: "bt-disconnect"
    send_response: true

actions:
  # Disconnect via shell (Android 13+ cmd bluetooth_manager)
  - type: shell
    command: "cmd bluetooth_manager disconnect {lv=bt_mac} 2>&1 || echo EXIT_CODE=$?"
    root: false
    output_var: "result"

  - type: notification
    title: "BT Disconnect"
    text: "Result: {lv=result}"
    channel_type: 2

  - type: http_response
    code: "OK"
    text: '{"status": "disconnected", "device": "WF-1000XM5"}'

constraints:
  - type: bluetooth
    device: "WF-1000XM5"
    state: "connected"
