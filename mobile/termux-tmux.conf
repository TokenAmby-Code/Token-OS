# ~/.tmux.conf for Termux (phone)
# Pulled via: fetch-tmux
#
# Pattern: local tmux = simple terminal multiplexer only.
# Phone SSHes per-pane to Mac/WSL — no structured workspace layout.
# Portable monitor SSHes once then attaches to remote tmux (no local workspace needed).

# ============================================================
# PREFIX — Ctrl-Space (matches ESC toolbar hold on Termux keyboard)
# ============================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================
# GENERAL
# ============================================================
set -g default-terminal "screen-256color"
set -g history-limit 20000
set -g escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# ============================================================
# MOUSE
# ============================================================
set -g mouse on

# ============================================================
# PANE NAVIGATION — vim-style
# ============================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================================
# SPLITS
# ============================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================
# STATUS BAR — minimal
# ============================================================
set -g status on
set -g status-interval 10
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"
set -g status-left  "#[fg=colour39,bold] #S "
set -g status-right "#[fg=colour245] %H:%M "
set -g status-left-length  20
set -g status-right-length 20

setw -g window-status-format         "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W "
