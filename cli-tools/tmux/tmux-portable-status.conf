# tmux-portable-status.conf — Status bar overrides for portable monitor
# Applied per-session (no -g) so the main Mac session is unaffected.
# Keybinds inherited from tmux-base.conf via the shared config chain.

# Top of screen — portable monitor is typically below eye level
set status-position top

# 2-line status bar for visibility on small display
set status 2

# Line 0 (top): session + window list (default behavior, just restyle)
set status-style "bg=colour236,fg=colour250"
set status-left-length 30
set status-left "#[fg=colour0,bg=colour39,bold]  #S  #[default] "
set status-right-length 54
# Timer/mode read in-format from the global @TIMER_SEG option (pushed by Token-API,
# zero fork). Same Mac server as the main session, so the global var is in scope
# here. The #(tmux-typing-guard-status) fork is the last one; Phase E retires it.
set status-right '#[fg=colour0,bg=colour236] #(tmux-typing-guard-status 2>/dev/null)#{@TIMER_SEG} #[fg=colour245]%H:%M '

set window-status-format         "#[fg=colour245,bg=colour234]   #I  #W   "
set window-status-current-format "#[fg=colour255,bg=colour27,bold]   #I  #W   #[default]"

# Line 1 (bottom): pane info + path
set status-format[1] "#[align=left,fg=colour245,bg=colour234] #{pane_current_command}  #[fg=colour39]#{=60:pane_current_path}#[align=right,fg=colour240] #{window_panes} panes "
