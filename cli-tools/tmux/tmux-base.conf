# tmux-base.conf — Shared config across all Imperium machines
# Source this from ~/.tmux.conf, then add device-specific overrides
# Location: cli-tools/tmux/tmux-base.conf (NAS canonical, shared across machines)

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on

# Aggressive resize: each window sized to the smallest client viewing it
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g allow-rename off

# --- Status bar ---
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 20
set -g status-left "#[fg=colour39,bold] #S #[default]| "

# Right: tmux-status (Token-API timer/mode) — devices without it get empty
set -g status-right-length 44
set -g status-right '#(tmux-typing-guard-status 2>/dev/null)#(tmux-status 2>/dev/null) '

# Window labels
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# Pane border labels — composed from four sources:
#   tmux-pane-label — instance name + Golden Throne timer from Token-API
#   @CC_STATE  — idle|processing|stopped (pushed by Token-API hooks)
#   @TTS_STATE — speaking|queued|"" (pushed by Token-API TTS worker)
#   @CONTEXT_INFO — model/tokens/cost (set by tmux-context status line script)
# Priority prefix: TTS queued (red) supersedes IDLE. Speaking shows 🔊. Stopped: dim.
# When nothing special: clean (work is happening).
set -g pane-border-status top
set -g pane-border-format " #(tmux-pane-label '#{pane_id}' '#{pane_title}' '#{@PANE_TITLE_SUPPRESS}' 2>/dev/null) #{?#{==:#{@TTS_STATE},queued},#[fg=red]#[bold]🔈 TTS #[default],#{?#{==:#{@TTS_STATE},speaking},#[fg=green]#[bold]🔊 #[default],#{?#{==:#{@CC_STATE},idle},#[fg=red]#[bold]#[blink]⏸ IDLE #[default],#{?#{==:#{@CC_STATE},stopped},#[fg=colour238]#[dim]● STOP #[default],}}}}#{?@CONTEXT_INFO,#{@CONTEXT_INFO},} "

# --- Pane lifecycle: auto-respawn all panes on death ---
set -g remain-on-exit on
set-hook -g pane-died 'run-shell "tmux-run tmux-pane-respawn #{pane_id}"'

# Mechanicus no-snap guard runs before the managed stack accordion. Raw tmux
# commands that bypass the shim are bounced unless an explicit navigation path
# opened a short-lived @IMPERIUM_ALLOW_MECHANICUS_FOCUS_* override.
set-hook -g after-select-pane 'run-shell -b "tmux-run tmuxctl mechanicus-focus-guard --pane #{pane_id} --client #{client_tty} --surface after-select-pane >/dev/null 2>&1 || true; tmux-run tmuxctl stack enforce --focus --pane #{pane_id} >/dev/null 2>&1 || true"'
set-hook -g after-select-window 'run-shell -b "tmux-run tmuxctl mechanicus-focus-guard --pane #{pane_id} --client #{client_tty} --surface after-select-window >/dev/null 2>&1 || true"'

# Managed stack guard: any pane born in legion/mechanicus is immediately typed
# and folded back into the page invariant. Unsupported windows are no-ops.
set-hook -g after-split-window 'run-shell -b "tmux-run tmuxctl stack enforce --admit --pane #{pane_id} >/dev/null 2>&1 || true"'
set-hook -g after-new-window 'run-shell -b "tmux-run tmuxctl stack enforce --admit --pane #{pane_id} >/dev/null 2>&1 || true"'

# --- Prefix: Ctrl-Space ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- Navigation (vim-style) ---
# Pane/window clicks and pane-navigation keys are explicit human navigation.
# Mark the current client as human before selecting, so the no-snap hook can
# distinguish literal UI navigation from programmatic focus changes.
bind -n MouseDown1Status { run-shell "tmuxctl allow-human-mechanicus-focus --reason mouse-status --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -t = }
bind -n MouseDown1Pane { run-shell "tmuxctl allow-human-mechanicus-focus --reason mouse-pane --client '#{client_tty}' >/dev/null 2>&1 || true" ; select-pane -t = ; send-keys -M }

# Prefix+h/j/k/l and prefix arrows enter pane-select mode. The first key moves
# once, then h/j/k/l or arrows continue moving with no prefix. Prefix arrows use
# cardinal page routing for their first move when the current page has a clear
# absolute target. Enter confirms and is consumed; Escape/q cancel.
bind h { run-shell "tmuxctl pane-select --mode relative --direction left --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind j { run-shell "tmuxctl pane-select --mode relative --direction down --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind k { run-shell "tmuxctl pane-select --mode relative --direction up --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind l { run-shell "tmuxctl pane-select --mode relative --direction right --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind Left { run-shell "tmuxctl pane-select --mode absolute --direction left --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind Down { run-shell "tmuxctl pane-select --mode absolute --direction down --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind Up { run-shell "tmuxctl pane-select --mode absolute --direction up --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind Right { run-shell "tmuxctl pane-select --mode absolute --direction right --client '#{client_tty}' >/dev/null 2>&1 || true" ; display-message "pane-select: h/j/k/l/arrows move, Enter confirm" ; switch-client -T pane-select }
bind -T pane-select h { run-shell "tmuxctl pane-select --mode relative --direction left --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select j { run-shell "tmuxctl pane-select --mode relative --direction down --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select k { run-shell "tmuxctl pane-select --mode relative --direction up --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select l { run-shell "tmuxctl pane-select --mode relative --direction right --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select Left { run-shell "tmuxctl pane-select --mode relative --direction left --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select Down { run-shell "tmuxctl pane-select --mode relative --direction down --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select Up { run-shell "tmuxctl pane-select --mode relative --direction up --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select Right { run-shell "tmuxctl pane-select --mode relative --direction right --client '#{client_tty}' >/dev/null 2>&1 || true" ; switch-client -T pane-select }
bind -T pane-select Enter display-message "pane selected"
bind -T pane-select Escape display-message "pane-select cancelled"
bind -T pane-select q display-message "pane-select cancelled"
# prefix+m jumps to the mechanicus window. (prefix+M is the plan/bypass mode
# toggle defined later — keep these distinct so neither shadows the other.)
bind m run-shell "IMPERIUM_ALLOW_MECHANICUS_FOCUS=1 tmux select-window -t '#{session_name}:mechanicus'"
# Mechanicus is normally window index 4. tmux's default Prefix+4 is a raw
# select-window, so the after-select-window no-snap hook cannot distinguish it
# from automation unless we open the short explicit-navigation override first.
bind 4 run-shell "tmuxctl allow-human-mechanicus-focus --reason prefix-window-4 --client '#{client_tty}' >/dev/null 2>&1 || true; IMPERIUM_ALLOW_TMUX_FOCUS=1 IMPERIUM_ALLOW_MECHANICUS_FOCUS=1 tmux select-window -t '#{session_name}:=4'"

# Pane resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Scroll / copy mode
bind -n C-k copy-mode -u

# Clear any stale copy-mode scroll overrides from prior config
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

# Scroll wheel: target ACTIVE pane, 3-line steps via run-shell.
#
# Why not -t= (mouse-target pane)?
#   Rii Bluetooth keyboard sends scroll events via phone SSH with bogus mouse
#   coordinates — resolves to wrong pane in multi-pane layouts. Only worked
#   when expanded/zoomed (single visible pane catches any coordinates).
#
# Why run-shell with ## escaping?
#   tmux pre-expands #{} in run-shell args using the mouse-target pane context.
#   ## escaping passes literal #{} to the shell, which feeds them to
#   `tmux list-panes` for correct per-pane evaluation.
#
# Why no mouse_any_flag forwarding?
#   send-keys -M from run-shell has no valid mouse event to forward — produces
#   garbage escape sequences apps interpret as arrow keys. Always tmux scrollback.
#
# Why synchronous (no -b)?
#   Async run-shell caused copy-mode race conditions (reverted 2026-04-02).
bind -n WheelUpPane run-shell 'eval $(tmux list-panes -f "##{pane_active}" -F "AP=##{pane_id} IM=##{pane_in_mode}"); if [ "$IM" = "1" ]; then tmux send-keys -t "$AP" -X -N 3 scroll-up; else tmux copy-mode -t "$AP" -e && tmux send-keys -t "$AP" -X -N 3 scroll-up; fi 2>/dev/null'
bind -n WheelDownPane run-shell 'eval $(tmux list-panes -f "##{pane_active}" -F "AP=##{pane_id} IM=##{pane_in_mode}"); if [ "$IM" = "1" ]; then tmux send-keys -t "$AP" -X -N 3 scroll-down; fi 2>/dev/null'

# Status bar toggle
bind s set -g status

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Rename current instance pane: DB first, then bridge to Claude Code /rename.
# Later the trigger router should consume the DB mutation and perform the tmux/UI update.
bind n command-prompt -p "pane name:" "run-shell 'tmux-run tmux-pane-rename \"#{pane_id}\" \"%%\"'"

# Workspace launcher
bind W run-shell "tmux-run tx start"

# Prompt launcher: prefix + Space opens a large text area and submits immediately
# on Enter, then launches a fresh legion pane via dispatch/d semantics.
bind Space display-popup -E -w 80% -h 70% "tmux-legion-prompt-popup"

# Workspace reset (confirm menu: reset formatting vs full wipe)
bind R run-shell "tmux-reset >/dev/null"

# Focus mode toggle (reads @FOCUSED to determine direction)
bind F run-shell "tmux-run tmux-focus toggle"

# Expand/retract active pane using native tmux zoom. This is intentionally
# automation-friendly: panes are not moved, stashed, swapped, or tombstoned, so
# explicit send-keys targets by %pane_id keep working while zoomed.
bind e run-shell "tmux-run tmux-grid-expand --client '#{client_tty}'"

# Claude mode toggle: plan <-> bypass (prefix + M)
bind M run-shell "tmux-run tmux-mode-toggle"

# Planning cycle: Shift+Tab cycles harness skill preplan -> /plan -> cleared.
# Claude skill invoke is /preplan; Codex skill invoke is $preplan.
# The key is intentionally not forwarded to the application.
bind -n BTab run-shell "tmux-run tmux-plan-prefix"

# Claude exit: Ctrl+C x3, stage resume in history, clear (prefix + Q)
bind Q run-shell "tmux-run tmux-claude-exit"

# Shuttle: context-aware pane promotion/demotion (prefix + d).
# Palace/Warp → demotes to legion. Legion/Kreig → popup selector to promote back.
# Tombstone panes use this as their bespoke jump-to-live action; expand stays native zoom.
bind d run-shell "tmux-run tmux-shuttle --client '#{client_tty}'"

# TTS listen: promote current pane's TTS to hot queue and play (prefix + P)
bind P run-shell "tmux-run tmux-tts-listen"

# BTW: brain dump reprompt — prepends /btw to prompt, captures, replaces (prefix + B)
# Uses display-panes to let user pick the target Claude pane
bind B run-shell "tmux-run bash ~/.claude/hooks/btw-capture.sh"

# Session doc: open the current pane's linked Obsidian session doc (prefix + S)
# Routes to the machine that triggered the keystroke via origin_machine.
bind S run-shell "tmux-run open-session-doc current '#{client_pid}'"

# Goto last spoken pane: jump to the pane whose Claude instance most recently TTSed (prefix + g)
# Resolves the most recent tts_playing/tts_starting/tts_queued event in agents.db,
# looks up claude_instances.tmux_pane, follows tombstones, then selects the live pane.
# Empty queue → tmux display-message.
bind g run-shell "tmux-run tmux-goto-spoken"
