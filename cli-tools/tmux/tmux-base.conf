# tmux-base.conf — Shared config across all Imperium machines
# Source this from ~/.tmux.conf, then add device-specific overrides
# Location: cli-tools/tmux/tmux-base.conf (NAS canonical, shared across machines)

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on

# Aggressive resize: each window sized to the smallest client viewing it
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g allow-rename off

# --- Status bar ---
set -g status on
# status-interval drives how often tmux re-runs the status-right + per-pane
# pane-border #() shell-outs. At 1s with N panes that was ~(2 + N) NAS-resident
# python spawns/sec (~18 at 16 panes) — ~90% of every second under a healthy NAS,
# and a hard freeze when SMB latency spikes (2026-06-05 hard restart). 5s cut the
# steady-state spawn load ~5x as an immediate floor. The pane-border #() (Phase 1)
# and the timer #(tmux-status) (Phase 2-A1 → now the pushed @TIMER_SEG) are both
# gone. The typing-guard marker is event-updated by key bindings; status rendering
# must not run a guard scanner or any other guard shell-out.
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"

# Left: session name plus current pane persona (if resolved). Persona belongs in
# the generic statusline, not in the pane-border nametag box.
set -g status-left-length 50
set -g status-left "#[fg=colour39,bold] #S #[default]#{?@PERSONA,#[fg=colour75] #{@PERSONA} #[default],}| "

# Right: timer/mode segment, pushed by Token-API's timer worker into the GLOBAL
# @TIMER_SEG option (icon + tmux-colored break balance) and read in-format here
# with ZERO fork per render. Devices without Token-API just render an empty var.
# The typing-guard state is NO LONGER shown as a global "⌨ GUARD" segment here —
# the guard is per-pane, so a single global light was misleading (it tracked only
# the current pane and could not say WHICH pane was guarded). status-right only
# reads the pushed timer segment; it must not shell out for typing-guard state.
set -g status-right-length 54
set -g status-right '#{@TIMER_SEG} '

# Window labels
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# Pane border labels — zero fork per redraw: pushed @-vars plus live tmux format math:
#   @PANE_LABEL — instance display name in the blue pane-border nametag box.
#                 This is intentionally NOT @PERSONA; persona belongs in the
#                 generic statusline next to #S.
#   @PERSONA   — persona display_name; pushed for the statusline, not read by
#                pane-border-format.
#   @GT_FIRE   — Golden Throne fire epoch (pushed once by Token-API GT engine)
#   @CC_STATE  — idle|processing|stopped (pushed by Token-API hooks)
#   @TTS_STATE — speaking|queued|"" (pushed by Token-API TTS worker)
#   @DISCORD_VOICE_LOCK — 1 while Cadia voice owns the pane for future input
#   @DISCORD_VOICE_PROCESSING — 1 only while transcript text is being applied
#   @OPS_SELECTED — "1" when this pane is the Ops Cockpit's selected/expanded instance
#                   (pushed by Token-API focus-pane endpoint + TTS focus-snap)
#   @SESSION_DOC — bound session_documents.title (📄; pushed on doc bind/rebind)
#   @CWD       — basename of the instance working_dir (📁; pushed at registration)
#   @TYPING_LOCK_UNTIL / @TYPING_PENDING_UNTIL — PER-PANE typing-guard
#                deadlines (absolute epoch seconds). The border computes the ⌨
#                diagnostic live from these timestamps on every redraw: pending
#                (red) wins over armed lock (orange), and expired/missing deadlines
#                render blank. It deliberately does NOT read @GUARD, because @GUARD
#                is a stored projection that can go stale on an idle pane.
# Engine-agnostic by design: every field above sources from the engine-agnostic
# `instances` table via the pushed-@-var pipeline (pane_state_queue → 1s worker →
# set-option -p), so Claude and Codex panes light up IDENTICALLY — nothing here
# branches on `engine`. @CONTEXT_INFO (model/tokens/cost) is NO LONGER read by the
# border — it lived only in Claude's own statusLine and was the one Claude-only
# field. tmux-context still SETS @CONTEXT_INFO for Claude's native statusLine; the
# border just stopped reading it (context already lives in Claude's footer).
# Phase 1 retired the per-pane `#(tmux-pane-label …)` shell-out that ran every
# status-interval × N panes. Pane-border identity reads ONLY @PANE_LABEL → BLANK.
# Blank is the DEFAULT: a pane shows a nametag ONLY when an agent/session name has
# been stamped (SessionStart stamps @PANE_LABEL=needs-name for fresh panes; rename
# triggers update it). @PERSONA is intentionally statusline-only and never a
# pane-border fallback. With no @PANE_LABEL the identity segment renders empty — no hostname or pane-title
# fallback and no suppress flag (both retired so a clean pane is blank by
# construction, not by special-casing). The GT countdown
# is computed in-format from @GT_FIRE via strftime %s (current epoch) + #{e|} integer
# math — ceil(minutes) = (fire − now + 59) / 60 — so it ticks on each redraw with
# ZERO forks. 3-tier colour (≥6m green, ≥3m yellow, else red) and a blink "GT DUE"
# once the fire epoch passes.
# (The clean-pane stamp @PANE_CLEAN is a separate semantic tracker and does
# NOT drive border rendering.)
# NOTE: styles MUST use separate #[fg=…]#[bg=…]#[bold] brackets, never one comma-joined
# #[fg=…,bg=…,bold] — tmux splits #{?…} branches on commas and a comma inside a single
# #[…] inside a conditional truncates the branch (validated on tmux 3.6a). #{e|} math
# uses COLON before the operands and COMMA between them: #{e|op:a,b}.
# Priority prefix: voice transcript processing (blink) supersedes voice lock; TTS queued (red) supersedes IDLE. Speaking shows 🔊. Stopped: dim.
# When nothing special: clean (work is happening).
# @OPS_SELECTED renders a magenta "◆ SEL" badge near the front when this pane is
# the Ops Cockpit's selected/expanded instance — orthogonal to TTS/GT/CC (a pane can be
# both speaking and selected). Its true-branch holds no bare comma (tmux splits #{?…}
# branches on commas), per the comma rule above.
set -g pane-border-status top
set -g pane-border-format " #{?@PANE_LABEL,#[fg=colour231]#[bg=colour31]#[bold] #{@PANE_LABEL} #[default],}#{?#{e|>=:#{@TYPING_PENDING_UNTIL},%s}, #[fg=red]#[bold]⌨#[default] ,#{?#{e|>=:#{@TYPING_LOCK_UNTIL},%s}, #[fg=colour214]#[bold]⌨#[default] ,}}#{?@OPS_SELECTED, #[fg=colour16]#[bg=colour213]#[bold]◆ SEL #[default],}#{?@GT_FIRE, #{?#{e|>=:0,#{e|/:#{e|+:#{e|-:#{@GT_FIRE},%s},59},60}},#[fg=red]#[bold]#[blink]GT DUE#[default],#{?#{e|>=:#{e|/:#{e|+:#{e|-:#{@GT_FIRE},%s},59},60},6},#[fg=green],#{?#{e|>=:#{e|/:#{e|+:#{e|-:#{@GT_FIRE},%s},59},60},3},#[fg=yellow],#[fg=red]}}#[bold]GT #{e|/:#{e|+:#{e|-:#{@GT_FIRE},%s},59},60}m#[default]},} #{?#{==:#{@DISCORD_VOICE_PROCESSING},1},#[fg=colour45]#[bold]#[blink]⟳ VOICE #[default],#{?#{==:#{@DISCORD_VOICE_LOCK},1},#[fg=colour141]#[bold]🎙 LOCK #[default],#{?#{==:#{@TTS_STATE},queued},#[fg=red]#[bold]🔈 TTS #[default],#{?#{==:#{@TTS_STATE},speaking},#[fg=green]#[bold]🔊 #[default],#{?#{==:#{@CC_STATE},idle},#[fg=red]#[bold]#[blink]⏸ IDLE #[default],#{?#{==:#{@CC_STATE},stopped},#[fg=colour238]#[dim]● STOP #[default],}}}}}} #{?@SESSION_DOC,#[fg=colour245]📄 #{@SESSION_DOC}#[default],} #{?@CWD,#[fg=colour245]📁 #{@CWD}#[default],} "

# --- Pane lifecycle: auto-respawn all panes on death ---
set -g remain-on-exit on
set-hook -g pane-died[90] 'run-shell -b "tmuxctld-ping POST /event event=pane-died pane=#{pane_id} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/event-failed"'
set-hook -g client-attached 'run-shell -b "tmuxctld-ping POST /client-lease cmd=attach client=#{q:client_tty} term=#{q:client_termname} pid=#{q:client_pid} session=#{q:session_name} reason=attach >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/client-lease-failed"'
set-hook -g client-detached 'run-shell -b "tmuxctld-ping POST /client-lease cmd=detach client=#{q:client_tty} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/client-lease-failed"'

# Navigation is unhooked by design. Selecting a pane or switching a window runs
# NO calculation — no focus guard, no stack enforce, nothing is bound to these
# actions. There is therefore no surface on which navigation can misfire: you
# cannot be snapped back to a pane you left, and a zoom in mechanicus cannot be
# undone, because nothing fires on select. (The old after-select-pane hook ran
# `stack enforce --focus`, whose own internal select-pane re-fired the hook — a
# self-feeding loop that both snapped focus and de-zoomed the accordion.)
#
# Mechanicus is protected at the SOURCE, not reactively after the fact: every
# automation-issued focus command funnels through the tmuxctl TmuxAdapter, which
# blocks select-pane/select-window/switch-client into mechanicus unless an
# explicit human override is open (tmux_adapter.py _mechanicus_focus_guard_blocks).
# A raw tmux focus change by automation that bypasses the adapter is a real bug
# to fix at its origin — never to cloak with a reactive teleport-back.

# Managed-stack admit is done at the SOURCE, not via a global birth hook. The old
# after-split-window / after-new-window hooks ran `tmuxctl stack enforce --admit`
# on EVERY pane/window born anywhere (palace, somnium, reservists, …) — a full
# tmuxctl process importing its ~22-module graph from the SMB/NAS mount on each
# birth, a no-op for non-managed windows and pure waste. Worse, the split-window
# inside add_orchestrator_stack_pane (_stack_core.py) re-fired the hook mid-dispatch,
# a redundant enforce racing the dispatch it was reacting to.
# Removed because the legitimate creation path already self-admits: dispatch/add
# route through add_orchestrator_stack_pane, which sets @STACK_PENDING=true and
# calls enforce_stack_layout(...) at the source (_stack_core.py:798,801). The only
# births that lose auto-admit are raw operator splits inside a managed window —
# intentionally NOT auto-enforced — and sweep_stack_assertions (stack.py) reconciles
# any genuine stray on its periodic pass.

# --- Prefix: Ctrl-Space ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix
# Prefix+Esc is an explicit "abort prefix" no-op: consume the prefix state and
# return to the root table without sending a command/key to the pane.
bind Escape { }

# --- Typing guard: keystroke-anchored per-pane lock ---
# The typing guard is an immediate shadow of KEYBOARD INPUT, not of focus: when
# the Emperor types into a pane it locks THAT pane, and the lock HOLDS even after
# he clicks away, until a 5-min timer or an Enter clears it. Clicking/focusing a
# pane must NEVER set or move the lock. The lock lives in the per-pane option
# @TYPING_LOCK_UNTIL (an absolute unix epoch); the universal send gate and the ⌨
# pane-border diagnostic both read it (tmuxctld/lib/tmuxctl/send_gate.py).
#
# Mechanism — a root-table any-key binding stamps the receiving pane, then REPLAYS
# the key with a bare `send-keys` (tmux: "if no keys are given and the command is
# bound to a key, then that key is used" — faithful for printable, special, and
# modified keys). This is pure-tmux and ZERO-FORK on every keystroke (no shell,
# no python shim — never reintroduce the per-keystroke shim lag, see the wheel
# note below). Only genuine client keystrokes traverse the key table; agent
# `tmux send-keys` injections target the pane's program directly and never reach
# `Any`, so the fleet's own sends never arm the lock (validated live).
#
# Properties baked into the format below:
#   * Arms on the FIRST keystroke only: if @TYPING_LOCK_UNTIL is still in the
#     future the existing value is KEPT (no refresh) — the window is "5 min since
#     FIRST keystroke", a deliberately lossy-but-lag-efficient abstraction, NOT
#     "5 min since LAST keystroke" (which made the guard a lag monster). When the
#     lock is absent/expired, a fresh ordinary keystroke calls
#     tmux-typing-guard-state arm --seconds 300.  That includes a live
#     Backspace/Ctrl+C PENDING hold: the follow-up ordinary keystroke converts
#     PENDING back to ON instead of leaving the pane wedged behind the stale
#     pending hold.
#   * "now" comes from #{client_activity}: the keypress refreshes the pressing
#     client's activity epoch before the binding runs, so it is the live wall
#     clock — used purely as a clock, never for per-pane attribution (that comes
#     from the binding firing on the focused pane). set -F cannot expand strftime
#     %s, so #{client_activity} is the zero-fork "now" source.
#   * The typing guard is keyboard-only, and Any is the catch-all backstop: tmux
#     routes EVERY mouse event lacking a more specific binding through Any too
#     (border clicks, status clicks, double/triple/second clicks, status-left/
#     right, …). The explicit Mouse*/Wheel* no-ops below cover only the common
#     names and provably MISS the rest — relying on that enumeration is what made
#     "mouse arms the guard" regress repeatedly. So Any itself discriminates by
#     the ONE reliable per-event signal: a real mouse event carries a non-empty
#     #{mouse_x}; a keystroke leaves it empty. The outer `if -F
#     '#{==:#{mouse_x},}'` is true ONLY for a keystroke (and, unlike the
#     truthiness form #{?mouse_x,…}, classifies a column-0 click — mouse_x=="0"
#     — correctly as a mouse event). The mouse branch CONSUMES the event: it
#     never arms the lock and never replays. (#{mouse_any_flag} is the pane
#     APP's mouse-reporting mode — it reads 0 for real click/release events — so
#     it is NOT an event discriminator. The discriminator is read-only and never
#     feeds `send-keys -M`, so the "no mouse target" softlock cannot recur.)
# Enter (and C-m) submit, moving the pane to a short PENDING hold through the
# same tmux-typing-guard-state pending helper. Backspace and Ctrl+C move
# ON/OFF -> pending for a longer 15s hold; repeated Backspace/Ctrl+C during
# pending is a bare send-keys. The pending hold remains send-blocking so queued
# automation cannot race into the prompt immediately after human
# editing/interruption/submission.
# copy-mode / pane-select / prefix sequences route through their own key tables,
# so they neither arm nor clear the lock. FocusIn/FocusOut are not bindable keys
# on tmux 3.6a; do not bind them here.
bind -n Any {
  if -F '#{==:#{mouse_x},}' {
    if -F '#{e|>=:#{@TYPING_LOCK_UNTIL},#{client_activity}}' {
      send-keys
    } {
      run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=arm pane=#{q:pane_id} seconds=300 now=#{client_activity} client=#{q:client_tty} term=#{q:client_termname} pid=#{q:client_pid} session=#{q:session_name} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed"
      send-keys
    }
  } {
  }
}
bind -n Enter { run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=pending pane=#{q:pane_id} seconds=5 now=#{client_activity} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed" ; send-keys }
bind -n C-m { run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=pending pane=#{q:pane_id} seconds=5 now=#{client_activity} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed" ; send-keys }
bind -n BSpace { if -F '#{e|>=:#{@TYPING_PENDING_UNTIL},#{client_activity}}' { send-keys } { run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=pending pane=#{q:pane_id} seconds=15 now=#{client_activity} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed" ; send-keys } }
bind -n C-h { if -F '#{e|>=:#{@TYPING_PENDING_UNTIL},#{client_activity}}' { send-keys } { run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=pending pane=#{q:pane_id} seconds=15 now=#{client_activity} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed" ; send-keys } }
bind -n C-c { if -F '#{e|>=:#{@TYPING_PENDING_UNTIL},#{client_activity}}' { send-keys } { run-shell -b "tmuxctld-ping POST /typing-guard-state cmd=pending pane=#{q:pane_id} seconds=15 now=#{client_activity} >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/typing-guard-state-failed" ; send-keys } }

# --- Navigation (vim-style) ---
# Pane/window clicks are tmux-internal focus changes — they bypass the tmuxctl
# adapter entirely, so they are always allowed and need no marker. Nothing fires
# on select, so a click can never be reverted.
bind -n MouseDown1Status switch-client -t =
bind -n MouseDown1Pane { select-pane -t = }
# Explicitly consume common pane mouse events so root-table Any never treats a
# mouse/focus event as keyboard input. Mouse may move focus; it must not arm,
# pending, clear, or replay through the typing guard.
bind -n MouseUp1Pane { }
bind -n MouseDrag1Pane { }
bind -n MouseDragEnd1Pane { }
bind -n MouseDown2Pane { }
bind -n MouseUp2Pane { }
bind -n MouseDown3Pane { }
bind -n MouseUp3Pane { }

# Prefix+h/j/k/l and prefix arrows enter pane-select mode. The first key moves
# once, then h/j/k/l or arrows continue moving with no prefix. Prefix h/j/k/l
# uses relative routing. Prefix arrows are absolute page routing: orchestrator
# stack pages (mechanicus, including spill suffixes) route through
# tmuxctl's role-aware stack selector; every other page jumps directly to the
# cardinal pane index with native tmux targets for low latency. Enter confirms by
# expanding the selected pane and is consumed; Escape/q cancel.
bind h { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; run-shell "tmuxctld-ping POST /pane-select mode=relative direction=left client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind j { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; run-shell "tmuxctld-ping POST /pane-select mode=relative direction=down client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind k { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; run-shell "tmuxctld-ping POST /pane-select mode=relative direction=up client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind l { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; run-shell "tmuxctld-ping POST /pane-select mode=relative direction=right client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind Left { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; if -F '#{m:mechanicus*,#{window_name}}' 'run-shell "tmuxctld-ping POST /pane-select mode=absolute direction=left client=''#{client_tty}'' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed"' 'select-pane -t "#{session_name}:#{window_index}.1"' ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind Down { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; if -F '#{m:mechanicus*,#{window_name}}' 'run-shell "tmuxctld-ping POST /pane-select mode=absolute direction=down client=''#{client_tty}'' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed"' 'select-pane -t "#{session_name}:#{window_index}.3"' ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind Up { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; if -F '#{m:mechanicus*,#{window_name}}' 'run-shell "tmuxctld-ping POST /pane-select mode=absolute direction=up client=''#{client_tty}'' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed"' 'select-pane -t "#{session_name}:#{window_index}.2"' ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind Right { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; if -F '#{m:mechanicus*,#{window_name}}' 'run-shell "tmuxctld-ping POST /pane-select mode=absolute direction=right client=''#{client_tty}'' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed"' 'select-pane -t "#{session_name}:#{window_index}.4"' ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind -T pane-select h { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=left client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select j { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=down client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select k { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=up client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select l { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=right client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select Left { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=left client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select Down { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=down client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select Up { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=up client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select Right { run-shell "tmuxctld-ping POST /pane-select mode=relative direction=right client='#{client_tty}' >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-select-failed" ; switch-client -T pane-select }
bind -T pane-select Enter run-shell -b "tmuxctld-ping POST /grid-expand client=\"#{client_tty}\" expand=1 >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/grid-expand-failed"
bind -T pane-select Escape display-message "pane-select cancelled"
bind -T pane-select q display-message "pane-select cancelled"
# prefix+m jumps to the mechanicus window. (prefix+M is the plan/bypass mode
# toggle defined later — keep these distinct so neither shadows the other.)
bind m run-shell "IMPERIUM_ALLOW_MECHANICUS_FOCUS=1 tmux select-window -t '#{session_name}:mechanicus'"
# Mechanicus is normally window index 4. This select-window routes through the
# tmux shim → adapter, whose source-level guard blocks focus into mechanicus; the
# explicit human override env lets this intentional navigation through.
bind 4 run-shell "tmuxctld-ping POST /allow-human-mechanicus-focus reason=prefix-window-4 client='#{client_tty}' >/dev/null || true; IMPERIUM_ALLOW_TMUX_FOCUS=1 IMPERIUM_ALLOW_MECHANICUS_FOCUS=1 tmux select-window -t '#{session_name}:=4'"

# Pane resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Scroll / copy mode
bind -n C-k copy-mode -u

# Clear any stale copy-mode scroll overrides from prior config
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

# Kill the emacs copy-mode 'g' goto-line prompt. We use mode-keys emacs, where 'g'
# opens a "(goto line)" command-prompt nobody uses — a pure input trap: a stray 'g'
# after a mouse-wheel scroll-up strands you in the status-line prompt, and escaping
# it cleanly is non-obvious (Esc closes the prompt, second Esc exits copy-mode).
# Scoped to copy-mode only; in copy-mode-vi 'g' is history-top (kept), ':' is goto-line.
unbind -T copy-mode g

# Kill the emacs copy-mode jump-to-char family — same input-trap class as 'g' above.
# f/F/t/T open "(jump forward/backward/to forward/to backward)" prompts and ;/, repeat
# them. These are command-prompt -1 (single keypress auto-submits), so a stray f/t after
# a scroll-up strands you in a prompt where the NEXT char re-fires the jump — Esc/Ctrl-C
# can't keep up and it reads as a lockup loop. Nobody jumps-to-char in scrollback.
# Scoped to copy-mode only; copy-mode-vi keeps its native f/F/t/T motions.
unbind -T copy-mode f
unbind -T copy-mode F
unbind -T copy-mode t
unbind -T copy-mode T
unbind -T copy-mode \;
unbind -T copy-mode ,

# Scroll wheel: target ACTIVE pane, 3-line steps, fully tmux-native.
#
# Why not -t= (mouse-target pane)?
#   Rii Bluetooth keyboard sends scroll events via phone SSH with bogus mouse
#   coordinates — resolves to wrong pane in multi-pane layouts. Only worked
#   when expanded/zoomed (single visible pane catches any coordinates).
#
# Why not -t ':' (the man page's "active pane of the specified window")?
#   A target whose session/window/pane parts are ALL empty short-circuits in
#   tmux's cmd-find to a wholesale copy of the command's current state — and a
#   mouse binding seeds that state with the MOUSE pane. Under-cursor again
#   (field-confirmed 2026-06-11; invisible to CLI tests, where the current
#   pane IS the active pane).
#
# Why not run-shell with a shell command (the pre-2026-06-11 implementation)?
#   The inner `tmux` calls resolve through the tmux server PATH to the
#   cli-tools shim -> `python -m tmuxctl.send_gate` over the NAS, and the
#   send_gate typing_guard held the human's own scroll 17-24s per wheel tick
#   while the human was "typing" (2026-06-10 unusable-lag incidents, twice).
#   The guard exists to hold AGENT injections; human-origin input must never
#   enter it. No key/mouse binding may invoke the shim. See vault ticket
#   Mars/Tasks/regression-wheel-scroll-through-send-gate-typing-guard.md.
#
# How this works: tmux has no native "active pane" target token, so the
# active pane's id is synthesized with the pane-loop format
# #{P:#{?pane_active,#{pane_id},}} and expanded by `run-shell -C` (tmux >=3.4:
# argument is a tmux command, not a shell command — executes in-server, forks
# nothing). The loop walks the mouse window, which is always the visible
# window — only the bogus PANE coordinate is discarded. The if-shell -F
# condition reads the ACTIVE pane's #{pane_in_mode} via the same loop.
# Synchronous on purpose: async run-shell caused copy-mode races (2026-04-02),
# and -C runs inline in the server anyway. Behavior preserved from the
# original: wheel-up enters copy-mode when not in a mode then scrolls 3;
# wheel-down scrolls only when already in a mode; always the ACTIVE pane.
# Validated 2026-06-11 on tmux 3.6a (mac, phone) and 3.4 (wsl).
%if "#{||:#{||:#{m:3.[4-9]*,#{version}},#{m:3.[1-9][0-9]*,#{version}}},#{m:[4-9].*,#{version}}}"
bind -n WheelUpPane if-shell -F '#{P:#{?pane_active,#{pane_in_mode},}}' {
  run-shell -C "send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-up"
} {
  run-shell -C "copy-mode -e -t '#{P:#{?pane_active,#{pane_id},}}' ; send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-up"
}
bind -n WheelDownPane if-shell -F '#{P:#{?pane_active,#{pane_in_mode},}}' {
  run-shell -C "send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-down"
} {}
%else
# tmux < 3.4: no run-shell -C. Deliberately bind NOTHING rather than ship the
# legacy run-shell form — its inner `tmux` resolves to the send_gate shim and
# recreates the 17-24s-per-scroll lag. Upgrade tmux to get wheel scrolling.
display-message "tmux-base.conf: tmux < 3.4 — wheel-scroll bindings skipped (upgrade tmux)"
%endif

# Status bar toggle
bind s set -g status

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Rename current instance pane: DB first, then bridge to Claude Code /rename.
# Empty submit triggers the interview (agent self-names via instance-name).
# Empty-name interview nudges are daemonized; explicit rename is bound to the
# same daemon route and currently fails loudly with its 501 anchor until the full
# instance-name + agent /rename flow is ported.
# Later the trigger router should consume the DB mutation and perform the tmux/UI update.
bind n command-prompt -p "instance name (empty = interview):" "run-shell 'tmuxctld-ping POST /pane-rename pane=\"#{pane_id}\" name=\"%%\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/pane-rename-failed'"

# Workspace launcher. Deliberately left as the shell CLI: it creates/attaches
# the top-level tmux workspace and is out of scope for daemon keybind rebinding.
bind W run-shell "tx start"

# Prompt launcher: prefix + Space opens a large text area and submits immediately
# on Enter, then launches a fresh mechanicus worker pane via direct dispatch semantics.
bind Space display-popup -E -w 80% -h 70% "tmux-legion-prompt-popup"

# Workspace reset (confirm menu: reset formatting vs full wipe)
bind R run-shell -b "tmuxctld-ping POST /reset pane=\"#{pane_id}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/reset-failed"

# Focus mode toggle (reads @FOCUSED to determine direction)
bind F run-shell -b "tmuxctld-ping POST /focus window=\"#{session_name}:#{window_index}\" mode=toggle >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/focus-failed"

# Expand/retract active pane using native tmux zoom. This is intentionally
# automation-friendly: panes are not moved, stashed, swapped, or tombstoned, so
# explicit send-keys targets by %pane_id keep working while zoomed.
bind e run-shell -b "tmuxctld-ping POST /grid-expand client=\"#{client_tty}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/grid-expand-failed"

# Persona engine hot-swap (prefix + E): protected persona panes respawn in-place
# under the other engine. Used for FG/Custodes Claude<->Codex limit rotation.
bind E run-shell -b "tmuxctld-ping POST /persona-engine pane=\"#{pane_id}\" toggle=1 >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/persona-engine-failed"

# Claude mode toggle: plan <-> bypass (prefix + M)
bind M run-shell -b "tmuxctld-ping POST /mode-toggle pane=\"#{pane_id}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/mode-toggle-failed"

# Planning menu: Shift+Tab opens an fzf picker — preplan / plan / compact /
# shift+tab / cancel. Each action INSERTS its command at the prompt start (no
# auto-submit, cursor returned to the end); preplan inserts the harness skill
# (/preplan or $preplan) and arms a one-shot Stop subscription that submits the
# plan turn after this pane stops; plan and compact insert /plan and /compact;
# shift+tab forwards ONE literal Shift+Tab (native mode cycle — this is how a raw
# Shift+Tab reaches the app); cancel is a no-op. The key is intentionally not
# forwarded to the application; the menu routes it.
#
# The invoking pane is passed via `-e BTAB_PANE=#{pane_id}`: tmux expands the
# format at key dispatch and exports it into the popup env. (display-popup neither
# expands a #{pane_id} in its shell-command nor exports $TMUX_PANE, so the prior
# `--pane '#{pane_id}'` arrived as a literal and every action no-op'd.)
#
# `-e TMUX_PLAN_MENU_DAEMON=1` opts the action into the warm tmuxctld: the whole
# prompt-start -> leader insert -> Codex sink -> prompt-end happens in one loopback
# round-trip instead of 3 cold `tmuxctl` Python spawns (the menu's 50x slowdown).
# The menu falls back to the local path automatically if the daemon is down.
bind -n BTab display-popup -E -w 32 -h 10 -e "BTAB_PANE=#{pane_id}" -e "TMUX_PLAN_MENU_DAEMON=1" "tmux-plan-menu"

# Mark current agent pane for closeout. The popup asks whether to send one final
# message, then arms a one-shot Stop-hook closeout that kills the pane and
# retires, archives, or banishes the instance. Choosing no final message closes
# immediately because there may be no future Stop hook.
# Single-quote the command so tmux does not expand $CLOSE_PANE at config-parse
# time (it would resolve to empty). #{pane_id} in -e still expands at keypress,
# and the popup shell expands $CLOSE_PANE from that env, passing the explicit
# captured pane instead of relying on the in-popup display-message fallback.
bind Q display-popup -E -w 64 -h 12 -e "CLOSE_PANE=#{pane_id}" 'tmux-mark-for-close --pane "$CLOSE_PANE"'

# Shuttle: context-aware pane promotion/demotion (prefix + d).
# Palace/Somnium → demotes to mechanicus. Mechanicus/Kreig → popup selector to promote back.
# Tombstone panes use this as their bespoke jump-to-live action; expand stays native zoom.
bind d run-shell -b "tmuxctld-ping POST /shuttle pane=\"#{pane_id}\" client=\"#{client_tty}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/shuttle-failed"

# TTS listen: promote current pane's TTS to hot queue and play (prefix + P)
bind P run-shell -b "tmuxctld-ping POST /tts/listen pane=\"#{pane_id}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/tts-listen-failed"

# BTW/SIDE: engine-aware brain-dump reprompt (prefix + B). Routes through
# ethereal-prompt, which detects Claude vs Codex on the active pane and fires
# the matching reformat — /btw (capture clean panel output, paste back for
# review) for Claude, /side for Codex. Sub-second resolution; btw-capture still
# backgrounds its own poll so run-shell returns promptly.
bind B run-shell -b "tmuxctld-ping POST /ethereal-prompt pane=\"#{pane_id}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/ethereal-prompt-failed"

# Session doc: open the current pane's linked Obsidian session doc (prefix + S)
# Resolves the pane to a session-doc id, then POSTs the one open-by-id endpoint
# (POST /api/session-docs/{id}/open), which opens it in Obsidian server-side.
bind S run-shell -b "tmuxctld-ping POST /open-session-doc pane=\"#{pane_id}\" >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/open-session-doc-failed"

# Goto last spoken pane: jump to the pane whose Claude instance most recently TTSed (prefix + g)
# Resolves the most recent tts_playing/tts_starting/tts_queued event in agents.db,
# looks up instances.tmux_pane, follows tombstones, then selects the live pane.
# Empty queue → tmux display-message.
bind g run-shell -b "tmuxctld-ping POST /goto-spoken >/dev/null || env IMPERIUM_TMUX_RAW=1 tmux display-message tmuxctld-ping-/goto-spoken-failed"
