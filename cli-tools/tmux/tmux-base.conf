# tmux-base.conf — Shared config across all Imperium machines
# Source this from ~/.tmux.conf, then add device-specific overrides
# Location: cli-tools/tmux/tmux-base.conf (NAS canonical, shared across machines)

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on

# Aggressive resize: each window sized to the smallest client viewing it
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Status bar ---
set -g status on
set -g status-interval 10
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 20
set -g status-left "#[fg=colour39,bold] #S #[default]| "

# Right: tmux-status (Token-API timer/mode) — devices without it get empty
set -g status-right-length 40
set -g status-right '#(tmux-status 2>/dev/null) '

# Window labels
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# Pane border labels — composed from three sources:
#   @CC_STATE  — idle|processing|stopped (pushed by Token-API hooks)
#   @TTS_STATE — speaking|queued|"" (pushed by Token-API TTS worker)
#   @CONTEXT_INFO — model/tokens/cost (set by tmux-context status line script)
# Idle: red blinking prefix. Stopped: dim. Processing: clean (work is happening).
# TTS: 🔊 speaking, 🔈 queued (appended after context info).
set -g pane-border-status top
set -g pane-border-format " #{?#{==:#{@CC_STATE},idle},#[fg=red]#[bold]#[blink]⏸ IDLE #[default],#{?#{==:#{@CC_STATE},stopped},#[fg=colour238]#[dim]● STOP #[default],}}#{?@CONTEXT_INFO,#{@CONTEXT_INFO},#{pane_title}}#{?#{==:#{@TTS_STATE},speaking}, 🔊,#{?#{==:#{@TTS_STATE},queued}, 🔈,}} "

# --- Pane lifecycle: auto-respawn all panes on death ---
set -g remain-on-exit on
set-hook -g pane-died 'run-shell "tmux-run tmux-pane-respawn #{pane_id}"'

# --- Prefix: Ctrl-Space ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- Navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Scroll / copy mode
bind -n C-k copy-mode -u

# Clear any stale copy-mode scroll overrides from prior config
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

# Scroll wheel: target ACTIVE pane, 3-line steps via run-shell.
#
# Why not -t= (mouse-target pane)?
#   Rii Bluetooth keyboard sends scroll events via phone SSH with bogus mouse
#   coordinates — resolves to wrong pane in multi-pane layouts. Only worked
#   when expanded/zoomed (single visible pane catches any coordinates).
#
# Why run-shell with ## escaping?
#   tmux pre-expands #{} in run-shell args using the mouse-target pane context.
#   ## escaping passes literal #{} to the shell, which feeds them to
#   `tmux list-panes` for correct per-pane evaluation.
#
# Why no mouse_any_flag forwarding?
#   send-keys -M from run-shell has no valid mouse event to forward — produces
#   garbage escape sequences apps interpret as arrow keys. Always tmux scrollback.
#
# Why synchronous (no -b)?
#   Async run-shell caused copy-mode race conditions (reverted 2026-04-02).
bind -n WheelUpPane run-shell 'eval $(tmux list-panes -f "##{pane_active}" -F "AP=##{pane_id} IM=##{pane_in_mode}"); if [ "$IM" = "1" ]; then tmux send-keys -t "$AP" -X -N 3 scroll-up; else tmux copy-mode -t "$AP" -e && tmux send-keys -t "$AP" -X -N 3 scroll-up; fi 2>/dev/null'
bind -n WheelDownPane run-shell 'eval $(tmux list-panes -f "##{pane_active}" -F "AP=##{pane_id} IM=##{pane_in_mode}"); if [ "$IM" = "1" ]; then tmux send-keys -t "$AP" -X -N 3 scroll-down; fi 2>/dev/null'

# Status bar toggle
bind s set -g status

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Workspace launcher
bind W run-shell "tmux-run tmux-workspace"

# Workspace reset (confirm menu: reset formatting vs full wipe)
bind R run-shell "tmux-reset >/dev/null"

# Focus mode toggle (reads @FOCUSED to determine direction)
bind F run-shell "tmux-run tmux-workspace --toggle-focus"

# Power grid: expand/retract active pane (toggle)
bind e run-shell "tmux-run tmux-grid-expand"

# Claude mode toggle: plan <-> bypass (prefix + M)
bind M run-shell "tmux-run tmux-mode-toggle"

# Claude exit: Ctrl+C x3, stage resume in history, clear (prefix + Q)
bind Q run-shell "tmux-run tmux-claude-exit"

# Shuttle: context-aware pane promotion/demotion (prefix + d)
# Palace/Warp → demotes to legion. Legion/Kreig → popup selector to promote back.
bind d run-shell "tmux-run tmux-shuttle"

# BTW: brain dump reprompt — prepends /btw to prompt, captures, replaces (prefix + B)
# Uses display-panes to let user pick the target Claude pane
bind B run-shell "tmux-run bash ~/.claude/hooks/btw-capture.sh"
