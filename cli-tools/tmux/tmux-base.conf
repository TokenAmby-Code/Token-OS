# tmux-base.conf — Shared config across all Imperium machines
# Source this from ~/.tmux.conf, then add device-specific overrides
# Location: cli-tools/tmux/tmux-base.conf (NAS canonical, shared across machines)

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on

# Aggressive resize: each window sized to the smallest client viewing it
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Status bar ---
set -g status on
set -g status-interval 10
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 20
set -g status-left "#[fg=colour39,bold] #S #[default]| "

# Right: tmux-status (Token-API timer/mode) — devices without it get empty
set -g status-right-length 40
set -g status-right '#(tmux-status 2>/dev/null) '

# Window labels
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# Pane border labels — show context info from @CONTEXT_INFO pane option
# Set by tmux-context (Claude Code status line script)
# Falls back to pane title (Claude session name) or pane index
set -g pane-border-status top
set -g pane-border-format " #{?@CONTEXT_INFO,#{@CONTEXT_INFO},#{pane_title}} "

# --- Prefix: Ctrl-Space ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- Navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Scroll / copy mode
bind -n C-k copy-mode -u

# Clear any stale copy-mode scroll overrides from prior config
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

# Scroll wheel: native tmux handling with 3-line steps
# Note: this scrolls the pane under the cursor (tmux default).
# The run-shell approach to force active-pane scrolling caused copy-mode
# race conditions that broke scrollback traversal — reverted 2026-04-02.
bind -n WheelUpPane if-shell -Ft= "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X scroll-up; send-keys -X scroll-up; send-keys -X scroll-up' 'copy-mode -e; send-keys -X scroll-up; send-keys -X scroll-up; send-keys -X scroll-up'"
bind -n WheelDownPane if-shell -Ft= "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X scroll-down; send-keys -X scroll-down; send-keys -X scroll-down' ''"

# Status bar toggle
bind s set -g status

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Workspace launcher
bind W run-shell "tmux-workspace >/dev/null"

# Workspace reset (confirm menu: reset formatting vs full wipe)
bind R run-shell "tmux-reset >/dev/null"

# Focus mode toggle (reads @FOCUSED to determine direction)
bind F run-shell "tmux-workspace --toggle-focus >/dev/null"

# Power grid: expand/retract active pane (toggle)
bind e run-shell "tmux-grid-expand >/dev/null"

# Claude mode toggle: plan <-> bypass (prefix + M)
bind M run-shell "tmux-mode-toggle >/dev/null"

# Claude exit: Ctrl+C x3, stage resume in history, clear (prefix + Q)
bind Q run-shell "tmux-claude-exit >/dev/null"

# BTW: brain dump reprompt — prepends /btw to prompt, captures, replaces (prefix + B)
# Uses display-panes to let user pick the target Claude pane
bind B run-shell "bash ~/.claude/hooks/btw-capture.sh >/dev/null 2>&1"
