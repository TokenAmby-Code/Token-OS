# Directory-to-tag mapping for Claude session tool injection
# Matches are prefix-based (subdirs inherit). ~ expands to $HOME.
# "all" includes every tool.

$IMPERIUM/Imperium-ENV:
  tags: [vault, workflow, system]

~/worktrees:
  tags: [deploy, db, git, pr, worktree, instance, workflow, system]

$CIVIC:
  tags: [deploy, db, git, pr, worktree, instance, workflow, system]

$IMPERIUM/Token-OS/token-api:
  tags: [token-api, deploy, instance]

$IMPERIUM/Token-OS/mobile:
  tags: [mobile, macrodroid]

$IMPERIUM/Token-OS/cli-tools:
  tags: [all]

$IMPERIUM/Token-OS:
  tags: [git, workflow, system, instance]
